name: Stundenplan Sync

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          WEBUNTIS_SERVER: ${{ secrets.WEBUNTIS_SERVER }}
          WEBUNTIS_SCHOOL: ${{ secrets.WEBUNTIS_SCHOOL }}
          WEBUNTIS_USERNAME: ${{ secrets.WEBUNTIS_USERNAME }}
          WEBUNTIS_PASSWORD: ${{ secrets.WEBUNTIS_PASSWORD }}
        run: python stundenplan.py

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update"
          git push
