name: Stundenplan Sync

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Stundenplan aktualisieren
        env:
          WEBUNTIS_SERVER: ${{ secrets.WEBUNTIS_SERVER }}
          WEBUNTIS_SCHOOL: ${{ secrets.WEBUNTIS_SCHOOL }}
          WEBUNTIS_USERNAME: ${{ secrets.WEBUNTIS_USERNAME }}
          WEBUNTIS_PASSWORD: ${{ secrets.WEBUNTIS_PASSWORD }}
        run: python stundenplan.py

      - name: Kalender-Datei committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stundenplan.ics docs/.nojekyll
          git diff --staged --quiet || git commit -m "Stundenplan aktualisiert"
          git push
