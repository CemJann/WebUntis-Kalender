name: Stundenplan Sync

on:
  schedule:
    # Läuft jeden Tag um 05:00 Uhr (UTC) = 06:00 / 07:00 Uhr DE-Zeit
    - cron: "0 5 * * *"

  # Manuell auslösen (z.B. zum Testen)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. Repository herunterladen
      - name: Repository auschecken
        uses: actions/checkout@v4

      # 2. Python einrichten
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Abhängigkeiten installieren
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      # 4. Skript ausführen
      - name: Stundenplan aktualisieren
        env:
          WEBUNTIS_SERVER:   ${{ secrets.WEBUNTIS_SERVER }}
          WEBUNTIS_SCHOOL:   ${{ secrets.WEBUNTIS_SCHOOL }}
          WEBUNTIS_USERNAME: ${{ secrets.WEBUNTIS_USERNAME }}
          WEBUNTIS_PASSWORD: ${{ secrets.WEBUNTIS_PASSWORD }}
        run: python stundenplan.py

      # 5. Geänderte Datei in das Repository committen
     - name: Kalender-Datei committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stundenplan.ics docs/.nojekyll
          git diff --staged --quiet || git commit -m "🔄 Stundenplan aktualisiert $(date '+%d.%m.%Y %H:%M')"
          git push
